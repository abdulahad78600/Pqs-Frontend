<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PQS Fund SPC — A Cayman Islands Segregated Portfolio Company</title>
    <meta name="description" content="PQS gives accredited investors, pharma companies, regulators, developers, and families access to institutional-grade pharmaceutical-grade cannabinoid and asset-backed Canadian real estate opportunities." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      // Apply persisted theme before first paint to avoid FOUC.
      (function () {
        try {
          var t = localStorage.getItem('pqs.theme');
          if (t !== 'light' && t !== 'dark') t = 'dark';
          var r = document.documentElement;
          r.classList.add(t === 'light' ? 'theme-light' : 'theme-dark');
          r.setAttribute('data-theme', t);
          r.style.colorScheme = t;
        } catch (e) {
          document.documentElement.classList.add('theme-dark');
        }
      })();
    </script>
  </head>
  <body class="text-sand-50 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
